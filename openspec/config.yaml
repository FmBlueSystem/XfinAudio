# OpenSpec/SDD project context for xfinaudio.
# Generated from repository inspection on 2026-06-06; keep user-maintained changes authoritative.
project:
  name: xfinaudio
  root: /Users/freddymolina/Documents/audio
  description: Metadata-driven DJ playlist assistant desktop app/discovery prototype.
  language: python
  python:
    requires: ">=3.11"
  application:
    type: desktop
    ui_framework: PySide6
    entrypoint: xfinaudio = xfinaudio.desktop.app:main
  source_roots:
    - src/xfinaudio
  test_roots:
    - tests
  package_manager: uv

stack:
  runtime:
    - Python >=3.11
    - PySide6 >=6.0,<7.0
  core_dependencies:
    - mutagen >=1.47,<2.0
    - pydantic >=2.0,<3.0
    - librosa >=0.10,<0.12
    - numpy >=1.24,<3.0
  dev_dependencies:
    - pytest >=8.0
    - pytest-cov >=7.1.0
    - pyright >=1.1.410
    - ruff >=0.11
    - pyinstaller ==6.20.0

sdd:
  methodology: gentle-ai.sdd-tdd.v1
  artifact_store: openspec
  execution_mode: auto
  strict_tdd: true
  phase_rules:
    - Do not implement changes during SDD initialization.
    - Use proposal, spec, design, tasks, apply, and verify phases for feature/refactor work.
    - In strict TDD, write or update failing tests before implementation during apply.
    - Keep OpenSpec artifacts in this repository's openspec/ tree.
    - Follow the project skill .atl/skills/gentle-ai-sdd-tdd/SKILL.md for the full lifecycle.
  current_intent:
    requested_change: Implement offline read-only spectral color features for transition scoring.
    status: In progress — apply phase.
    reference_history:
      - openspec/changes/spectral-color-features/design.md

testing:
  runner: pytest
  framework: pytest 9.0.3
  primary_command: uv run pytest -q
  strict_tdd: true
  test_layers:
    unit: { available: true, tool: pytest }
    integration: { available: true, tool: pytest }
    ui: { available: true, tool: pytest + PySide6 offscreen }
    e2e: { available: true, tool: pytest }
  coverage:
    available: true
    tool: pytest-cov
    command: uv run pytest --cov --cov-fail-under=70 -q
  type_checker:
    available: true
    tool: pyright
    command: uv run pyright src tests
  validation_commands:
    - uv run pytest -q
    - uv run pyright src tests
    - uv run pytest --cov --cov-fail-under=70 -q
    - uv run ruff check .
    - uv run ruff format --check .
  pytest:
    testpaths:
      - tests
    pythonpath:
      - src
  linting:
    ruff:
      available: true
      target_version: py311
      line_length: 120
      lint_select:
        - E
        - W
        - F
        - I
        - B
        - C4
        - UP
        - SIM
      format:
        quote_style: double
        indent_style: space
  formatter:
    tool: ruff
    available: true
    command: uv run ruff format .

conventions:
  planning_history: .planning/codebase/AGENT-DISPATCH.md
  skill_registry: .atl/skill-registry.md
  review_budget_changed_lines: 400
